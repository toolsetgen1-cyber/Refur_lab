<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>리퍼연구소</title>
    <style>
        body { background: #1a1a2e; color: #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: -apple-system, sans-serif; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: #4A90E2; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #msg { font-size: 14px; color: #aaa; text-align: center; padding: 0 20px; }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <div id="msg">시스템에 연결하는 중...</div>
    <script>
        // 💡 Settings 시트의 B1 셀을 정확히 타겟팅하는 URL입니다.
        const CSV_URL = "https://docs.google.com/spreadsheets/d/1QqMhGtViuFdShiuNLLJIRGiQeRjEOmuUpzLH3I8sF-c/export?format=csv&gid=1114002661&range=B1";

        async function doRedirect() {
            try {
                // 캐시를 무시하고 항상 최신 시트 값을 가져옵니다.
                const response = await fetch(CSV_URL, { cache: "no-store" });
                if (!response.ok) throw new Error("Network error");
                const data = await response.text();
                
                // CSV 데이터에서 URL만 깔끔하게 추출
                const targetUrl = data.trim().replace(/^"|"$/g, "").split('\n')[0].trim();

                if (targetUrl && targetUrl.startsWith("http")) {
                    window.location.replace(targetUrl);
                } else {
                    document.getElementById("msg").textContent = "Settings 시트 B1 셀의 URL을 확인해주세요.";
                }
            } catch (error) {
                console.error(error);
                document.getElementById("msg").textContent = "연결 실패. 시트가 '웹에 게시'되었는지 확인해주세요.";
            }
        }
        
        // 브라우저 안정성을 위해 0.3초 후 실행
        setTimeout(doRedirect, 300);
    </script>
</body>
</html>
